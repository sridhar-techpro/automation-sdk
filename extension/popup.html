<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Automation SDK</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      width: 300px;
      background: #1e1e2e;
      color: #cdd6f4;
      padding: 12px;
    }
    h1 {
      font-size: 14px;
      font-weight: 600;
      color: #cba6f7;
      margin-bottom: 12px;
      letter-spacing: 0.03em;
    }
    .field { margin-bottom: 8px; }
    label {
      display: block;
      font-size: 11px;
      color: #a6adc8;
      margin-bottom: 3px;
    }
    input, select {
      width: 100%;
      padding: 6px 8px;
      background: #313244;
      border: 1px solid #45475a;
      border-radius: 4px;
      color: #cdd6f4;
      font-size: 12px;
      outline: none;
    }
    input:focus, select:focus { border-color: #cba6f7; }
    textarea {
      width: 100%;
      padding: 6px 8px;
      background: #313244;
      border: 1px solid #45475a;
      border-radius: 4px;
      color: #cdd6f4;
      font-size: 12px;
      outline: none;
      resize: vertical;
      font-family: inherit;
    }
    textarea:focus { border-color: #89b4fa; }
    .goal-actions { display: flex; gap: 6px; margin-top: 6px; }
    #btn-send {
      flex: 1;
      padding: 7px 0;
      border: none;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      background: #89b4fa;
      color: #1e1e2e;
      transition: opacity 0.15s;
    }
    #btn-send:hover:not(:disabled) { opacity: 0.85; }
    #btn-send:disabled { opacity: 0.45; cursor: not-allowed; }
    #goal-status {
      margin-top: 6px;
      padding: 5px 8px;
      border-radius: 4px;
      font-size: 11px;
      display: none;
    }
    #goal-status.success { background: #a6e3a1; color: #1e1e2e; display: block; }
    #goal-status.error   { background: #f38ba8; color: #1e1e2e; display: block; }
    #goal-status.info    { background: #89dceb; color: #1e1e2e; display: block; }
    .divider {
      border: none;
      border-top: 1px solid #45475a;
      margin: 12px 0;
    }
    .actions { display: flex; gap: 6px; margin-top: 12px; }
    button {
      flex: 1;
      padding: 7px 0;
      border: none;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button:disabled { opacity: 0.45; cursor: not-allowed; }
    #btn-run {
      background: #cba6f7;
      color: #1e1e2e;
    }
    #btn-run:hover:not(:disabled) { opacity: 0.85; }
    #btn-clear {
      background: #45475a;
      color: #cdd6f4;
    }
    #btn-clear:hover:not(:disabled) { opacity: 0.8; }
    #status {
      margin-top: 10px;
      padding: 6px 8px;
      border-radius: 4px;
      font-size: 11px;
      display: none;
    }
    #status.success { background: #a6e3a1; color: #1e1e2e; display: block; }
    #status.error   { background: #f38ba8; color: #1e1e2e; display: block; }
    #status.info    { background: #89dceb; color: #1e1e2e; display: block; }
  </style>
</head>
<body>
  <h1>Automation SDK</h1>

  <!-- ── Goal input (natural language) ──────────────────────────────── -->
  <div class="field">
    <label for="goal-input">Goal</label>
    <textarea id="goal-input" rows="3"
      placeholder="e.g. Click the Add to Cart button for the first product"></textarea>
    <div class="goal-actions">
      <button id="btn-send" type="button">Send</button>
    </div>
    <div id="goal-status"></div>
  </div>

  <hr class="divider" />

  <!-- ── Manual action (structured) ─────────────────────────────────── -->
    <label for="action">Action</label>
    <select id="action">
      <option value="navigate">Navigate</option>
      <option value="click">Click</option>
      <option value="type">Type</option>
      <option value="screenshot">Screenshot</option>
    </select>
  </div>

  <div class="field">
    <label for="target">Target / URL</label>
    <input id="target" type="text" placeholder="CSS selector or URL" />
  </div>

  <div class="field" id="value-field">
    <label for="value">Value (for type action)</label>
    <input id="value" type="text" placeholder="Text to type" />
  </div>

  <div class="actions">
    <button id="btn-run">Run</button>
    <button id="btn-clear">Clear</button>
  </div>

  <div id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
