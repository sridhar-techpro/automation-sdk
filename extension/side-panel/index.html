<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Automation SDK — Goal Runner</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #1e1e2e;
      color: #cdd6f4;
      padding: 16px;
      min-height: 100vh;
    }
    h2 { font-size: 14px; font-weight: 600; color: #89b4fa; margin-bottom: 12px; }
    textarea {
      width: 100%;
      height: 120px;
      padding: 10px;
      background: #313244;
      border: 1px solid #45475a;
      border-radius: 6px;
      color: #cdd6f4;
      font-size: 13px;
      font-family: inherit;
      resize: vertical;
      outline: none;
    }
    textarea:focus { border-color: #89b4fa; }
    textarea::placeholder { color: #6c7086; }
    .actions { display: flex; gap: 8px; margin-top: 8px; }
    button[type="submit"] {
      flex: 1;
      padding: 9px 0;
      background: #89b4fa;
      color: #1e1e2e;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button[type="submit"]:hover:not(:disabled) { opacity: 0.85; }
    button[type="submit"]:disabled { opacity: 0.45; cursor: not-allowed; }
    #status {
      margin-top: 8px;
      font-size: 11px;
      color: #89dceb;
      min-height: 16px;
    }
    #result {
      margin-top: 14px;
      padding: 12px;
      background: #313244;
      border-radius: 6px;
      font-size: 13px;
      line-height: 1.6;
      white-space: pre-wrap;
      display: none;
    }
    #result.visible { display: block; }
  </style>
</head>
<body>
  <h2>Automation SDK — Goal Runner</h2>

  <textarea
    id="goal-input"
    placeholder="Describe your goal, e.g. Search for smartphones under ₹20,000 with 4+ rating and suggest top 3 with reasoning."
    aria-label="goal"
  ></textarea>

  <div class="actions">
    <button type="submit" id="btn-send" aria-label="send goal">Send</button>
  </div>

  <div id="status"></div>
  <div id="result"></div>

  <script src="index.js"></script>
</body>
</html>
