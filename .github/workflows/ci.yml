name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  # ── Unit + SDK E2E tests ────────────────────────────────────────────────────
  unit-and-e2e:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Build SDK
        run: pnpm run build

      - name: Unit tests
        run: pnpm run test:unit

      - name: E2E tests (SDK)
        run: |
          Xvfb :99 -screen 0 1280x800x24 &
          sleep 1
          DISPLAY=:99 CHROME_PATH=/usr/bin/google-chrome pnpm run test:e2e

  # ── Extension E2E tests (real Chrome + real popup + backend + OpenAI) ───────
  extension-e2e:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      DISPLAY: ":99"
      # OPENAI_API_KEY is injected from the repository secret.
      # The backend subprocess inherits it automatically.
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies (Xvfb + Chrome libs)
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            xvfb \
            libgconf-2-4 \
            libatk1.0-0 \
            libatk-bridge2.0-0 \
            libgdk-pixbuf2.0-0 \
            libgtk-3-0 \
            libgbm-dev \
            libnss3 \
            libasound2 \
            libx11-xcb1 \
            libxcomposite1 \
            libxdamage1 \
            libxrandr2 \
            libxtst6

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Build SDK
        run: pnpm run build

      - name: Build extension (TypeScript → JavaScript)
        run: pnpm run build:extension

      - name: Install Python backend dependencies
        run: pip install fastapi uvicorn openai pydantic python-dotenv

      # Cache the Puppeteer-downloaded Chrome stable so subsequent runs are fast
      - name: Cache Puppeteer Chrome stable
        id: cache-chrome
        uses: actions/cache@v4
        with:
          path: ~/.cache/automation-sdk/chromium
          key: puppeteer-chrome-stable-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            puppeteer-chrome-stable-${{ runner.os }}-

      - name: Download Puppeteer Chrome stable
        # Download only when not restored from cache.
        # This Chrome build has no enterprise policies that block --load-extension.
        run: |
          node -e "
          const { install, Browser, detectBrowserPlatform, resolveBuildId } = require('@puppeteer/browsers');
          const os = require('os');
          const path = require('path');
          const cacheDir = path.join(os.homedir(), '.cache', 'automation-sdk', 'chromium');
          (async () => {
            const platform = detectBrowserPlatform();
            const buildId = await resolveBuildId(Browser.CHROME, platform, 'stable');
            console.log('Downloading Chrome stable build', buildId);
            const result = await install({
              browser: Browser.CHROME, buildId, cacheDir,
              downloadProgressCallback: (d, t) => t > 0 && process.stdout.write('\r  ' + Math.round(d/t*100) + '%   ')
            });
            process.stdout.write('\n');
            console.log('Chrome ready at:', result.executablePath);
          })().catch(e => { console.error(e.message); process.exit(1); });
          "

      - name: Start Xvfb
        run: |
          Xvfb :99 -screen 0 1280x800x24 &
          sleep 1

      - name: Run extension E2E tests
        run: pnpm run test:e2e-extension
        # OPENAI_API_KEY from env above is automatically inherited by:
        #   1. The Jest test runner process
        #   2. The uvicorn subprocess spawned in beforeAll
        #   3. The backend's planner.py → OpenAI client
        # No key → heuristic mock plan is used instead (tests still pass)
